<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SkyCast — Weather Map</title><link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{overflow:hidden}
.page-wrap{height:100vh;display:flex;flex-direction:column}
#map-container{flex:1;position:relative;margin-top:var(--nav-h)}
#wmap{position:absolute;inset:0;z-index:1}
.layer-panel{position:absolute;top:1rem;right:1rem;z-index:1000;background:rgba(8,18,38,.93);border:1px solid var(--glass-border2);border-radius:var(--radius);padding:1rem 1.1rem;backdrop-filter:blur(28px);min-width:178px;box-shadow:var(--shadow-l)}
.lp-title{font-family:var(--fd);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin-bottom:.75rem}
.lbtn{display:flex;align-items:center;gap:.55rem;width:100%;padding:.48rem .7rem;border-radius:8px;border:1px solid transparent;background:none;color:var(--muted);font-size:.85rem;font-family:var(--fb);cursor:pointer;transition:var(--trans);margin-bottom:.2rem;text-align:left}
.lbtn:hover{background:var(--glass);color:var(--text)}
.lbtn.active{background:rgba(56,189,248,.1);color:var(--accent);border-color:rgba(56,189,248,.25)}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-search{position:absolute;top:1rem;left:50%;transform:translateX(-50%);z-index:1000;width:340px;max-width:calc(100vw - 2rem)}
.map-search .search-input{background:rgba(8,18,38,.93);border-color:var(--glass-border2)}
.map-info{position:absolute;bottom:1.5rem;left:1rem;z-index:1000;background:rgba(8,18,38,.93);border:1px solid var(--glass-border2);border-radius:var(--radius);padding:1rem 1.25rem;backdrop-filter:blur(28px);min-width:240px;max-width:300px;box-shadow:var(--shadow-l);display:none}
.map-info.show{display:block;animation:fadeIn .2s ease}
.mi-city{font-family:var(--fd);font-weight:700;font-size:1rem;margin-bottom:.4rem}
.mi-temp{font-family:var(--fm);font-size:2rem;font-weight:700;line-height:1}
.mi-cond{font-size:.8rem;color:var(--muted);margin-top:.2rem;text-transform:capitalize}
.mi-meta{display:flex;gap:1rem;margin-top:.75rem;flex-wrap:wrap}
.mi-item{font-size:.75rem;color:var(--muted)}.mi-item strong{color:var(--text)}
.mi-close{position:absolute;top:.6rem;right:.75rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem}
.map-legend{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(8,18,38,.88);border:1px solid var(--glass-border);border-radius:var(--radius-s);padding:.5rem 1rem;display:flex;align-items:center;gap:.5rem;backdrop-filter:blur(24px)}
.leg-bar{width:120px;height:8px;border-radius:4px}
.leg-label{font-size:.68rem;color:var(--muted);font-family:var(--fm)}
.map-locate{position:absolute;bottom:1.5rem;right:1rem;z-index:1000}
.leaflet-container{background:#0a1628;font-family:var(--fb)}
.leaflet-popup-content-wrapper{background:rgba(8,18,38,.95);color:var(--text);border:1px solid var(--glass-border2);border-radius:var(--radius-s)}
.leaflet-popup-tip{background:rgba(8,18,38,.95)}
.leaflet-control-zoom{display:none}
</style></head><body>
<div class="page-wrap">
<nav class="nav" style="z-index:2000"><a href="../index.html" class="nav-logo">🌤️ SkyCast</a>
<ul class="nav-links" id="nl"><li><a href="../index.html">🏠 Dashboard</a></li><li><a href="forecast.html">📅 Forecast</a></li><li><a href="hourly.html">🕐 Hourly</a></li><li><a href="map.html" class="active">🗺️ Map</a></li><li><a href="air-quality.html">🌿 Air Quality</a></li><li><a href="alerts.html">⚠️ Alerts</a></li><li><a href="compare.html">⚖️ Compare</a></li><li><a href="settings.html">⚙️ Settings</a></li></ul>
<div class="nav-right"><button class="hamburger" onclick="document.getElementById('nl').classList.toggle('mob-open')"><span></span><span></span><span></span></button></div></nav>
<div id="map-container">
  <div id="wmap"></div>
  <div class="map-search"><div class="search-wrap" style="position:relative"><span class="search-icon">🔍</span><input class="search-input" id="map-search" type="text" placeholder="Search city…"/></div></div>
  <div class="layer-panel">
    <div class="lp-title">🌐 Overlays</div>
    <button class="lbtn active" id="lt" onclick="setLayer('temp_new')"><span class="ldot" style="background:#f97316"></span> Temperature</button>
    <button class="lbtn" id="lc" onclick="setLayer('clouds_new')"><span class="ldot" style="background:#94a3b8"></span> Clouds</button>
    <button class="lbtn" id="lp" onclick="setLayer('precipitation_new')"><span class="ldot" style="background:#38bdf8"></span> Precipitation</button>
    <button class="lbtn" id="lw" onclick="setLayer('wind_new')"><span class="ldot" style="background:#818cf8"></span> Wind</button>
    <button class="lbtn" id="lpr" onclick="setLayer('pressure_new')"><span class="ldot" style="background:#fb923c"></span> Pressure</button>
    <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--glass-border)">
      <div class="lp-title">🗺️ Base Map</div>
      <button class="lbtn active" id="bd" onclick="setBase('dark')">🌑 Dark</button>
      <button class="lbtn" id="bs" onclick="setBase('satellite')">🛰️ Satellite</button>
      <button class="lbtn" id="bst" onclick="setBase('street')">🏙️ Streets</button>
    </div>
  </div>
  <div class="map-info" id="map-info">
    <button class="mi-close" onclick="document.getElementById('map-info').classList.remove('show')">✕</button>
    <div class="mi-city" id="mi-city">—</div>
    <div class="mi-temp" id="mi-temp">—</div>
    <div class="mi-cond" id="mi-cond">—</div>
    <div class="mi-meta"><div class="mi-item">💧 <strong id="mi-hum">—</strong></div><div class="mi-item">💨 <strong id="mi-wind">—</strong></div><div class="mi-item">👁 <strong id="mi-vis">—</strong></div></div>
  </div>
  <div class="map-legend"><span class="leg-label" id="leg-min">Cold</span><div class="leg-bar" id="leg-bar" style="background:linear-gradient(90deg,#2563ab,#38bdf8,#4ade80,#facc15,#f97316,#ef4444)"></div><span class="leg-label" id="leg-max">Hot</span></div>
  <div class="map-locate"><button class="btn btn-ghost btn-sm" onclick="locateMe()" title="My location">📍</button></div>
</div></div>
<script src="../js/config.js"></script><script src="../js/api.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
requireAuth();
const sv=JSON.parse(localStorage.getItem('skycast_last')||'null');
const iLat=sv?sv.lat:CONFIG.DEFAULT_LAT,iLon=sv?sv.lon:CONFIG.DEFAULT_LON;
const map=L.map('wmap',{zoomControl:false,attributionControl:false}).setView([iLat,iLon],5);
const bases={dark:L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}),satellite:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18}),street:L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18})};
bases.dark.addTo(map);let curBase='dark',wLayer=null,curLayerName='temp_new';
function setLayer(name){
  if(wLayer)map.removeLayer(wLayer);
  wLayer=L.tileLayer(`https://tile.openweathermap.org/map/${name}/{z}/{x}/{y}.png?appid=${CONFIG.API_KEY}`,{opacity:.65,maxZoom:18}).addTo(map);
  curLayerName=name;
  document.querySelectorAll('.lbtn[id^="l"]').forEach(b=>b.classList.remove('active'));
  const map2={temp_new:'lt',clouds_new:'lc',precipitation_new:'lp',wind_new:'lw',pressure_new:'lpr'};
  if(map2[name])document.getElementById(map2[name]).classList.add('active');
  const legs={temp_new:{mn:'-40°',mx:'40°+',bar:'linear-gradient(90deg,#2563ab,#38bdf8,#4ade80,#facc15,#f97316,#ef4444)'},clouds_new:{mn:'0%',mx:'100%',bar:'linear-gradient(90deg,transparent,#94a3b8,#1e293b)'},precipitation_new:{mn:'None',mx:'Heavy',bar:'linear-gradient(90deg,transparent,#38bdf8,#1d4ed8)'},wind_new:{mn:'Calm',mx:'Storm',bar:'linear-gradient(90deg,#4ade80,#818cf8,#7c3aed)'},pressure_new:{mn:'Low',mx:'High',bar:'linear-gradient(90deg,#60a5fa,#fbbf24,#f97316)'}};
  const l=legs[name]||legs['temp_new'];document.getElementById('leg-min').textContent=l.mn;document.getElementById('leg-max').textContent=l.mx;document.getElementById('leg-bar').style.background=l.bar;
}
function setBase(name){if(bases[curBase])map.removeLayer(bases[curBase]);bases[name].addTo(map);curBase=name;if(wLayer){map.removeLayer(wLayer);setLayer(curLayerName);}
  document.querySelectorAll('.lbtn[id^="b"]').forEach(b=>b.classList.remove('active'));document.getElementById('b'+name[0]+(name==='street'?'st':'')).classList.add('active');}
setLayer('temp_new');
let clickMkr=null;
map.on('click',async e=>{
  const{lat,lng}=e.latlng;if(clickMkr)map.removeLayer(clickMkr);
  clickMkr=L.circleMarker([lat,lng],{radius:7,color:'#38bdf8',fillColor:'#38bdf8',fillOpacity:.8,weight:2}).addTo(map);
  try{const w=await WeatherAPI.getCurrent(lat,lng),sym=getUnit()==='metric'?'°C':'°F';
    document.getElementById('mi-city').textContent='📍 '+w.name+', '+w.sys.country;
    document.getElementById('mi-temp').textContent=Math.round(w.main.temp)+sym;
    document.getElementById('mi-cond').textContent=w.weather[0].description;
    document.getElementById('mi-hum').textContent=w.main.humidity+'%';
    document.getElementById('mi-wind').textContent=w.wind.speed+' '+(getUnit()==='metric'?'m/s':'mph');
    document.getElementById('mi-vis').textContent=(w.visibility/1000).toFixed(1)+' km';
    document.getElementById('map-info').classList.add('show');
  }catch(e){showToast('Could not fetch weather','error');}
});
initSearch('map-search',({lat,lon})=>{map.setView([lat,lon],8,{animate:true});map.fire('click',{latlng:{lat,lng:lon}});});
function locateMe(){navigator.geolocation.getCurrentPosition(p=>{map.setView([p.coords.latitude,p.coords.longitude],10,{animate:true});L.circleMarker([p.coords.latitude,p.coords.longitude],{radius:10,color:'#4ade80',fillColor:'#4ade80',fillOpacity:.7,weight:3}).addTo(map).bindPopup('📍 You are here').openPopup();});}
document.body.style.overflow='hidden';
</script></body></html>
