<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SkyCast — Air Quality</title><link rel="stylesheet" href="../css/global.css"/>
<style>
.page-title{font-family:var(--fd);font-size:2rem;font-weight:800}.page-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem}
.search-row{display:flex;gap:.75rem;align-items:center;margin-bottom:1.5rem}
.search-row .search-wrap{flex:1;max-width:340px;position:relative}
.aqi-hero{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.aqi-main{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:2rem 2.25rem;backdrop-filter:blur(24px);position:relative;overflow:hidden}
.aqi-scale{display:flex;gap:3px;margin:1.25rem 0 .5rem;height:10px;border-radius:5px;overflow:hidden}
.aqi-seg{flex:1;height:100%;transition:opacity .3s ease}
.aqi-seg.active{opacity:1;box-shadow:0 0 12px currentColor}.aqi-seg.dim{opacity:.22}
.aqi-num{font-family:var(--fm);font-size:5rem;font-weight:700;line-height:1}
.aqi-label{font-family:var(--fd);font-size:1.3rem;font-weight:700;margin-top:.25rem}
.aqi-desc{font-size:.875rem;color:var(--muted);margin-top:.75rem;line-height:1.6;max-width:340px}
.aqi-health{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.5rem 2rem;backdrop-filter:blur(24px)}
.hr-row{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.hr-row:last-child{border-bottom:none}
.hr-emoji{font-size:1.3rem;line-height:1;margin-top:.1rem}
.hr-title{font-weight:600;font-size:.9rem}.hr-desc{font-size:.8rem;color:var(--muted);margin-top:.1rem;line-height:1.5}
.fc-strip{display:flex;gap:.65rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:thin;margin-bottom:1.5rem}
.fc-card{flex-shrink:0;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-s);padding:.9rem .8rem;text-align:center;min-width:70px;backdrop-filter:blur(20px)}
.fc-time{font-size:.65rem;color:var(--muted)}.fc-num{font-family:var(--fm);font-size:1.1rem;font-weight:700;margin-top:.3rem}.fc-lbl{font-size:.62rem;margin-top:.2rem}
.poll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.25rem}
.poll-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.25rem 1.4rem;backdrop-filter:blur(24px);transition:var(--trans)}
.poll-card:hover{transform:translateY(-2px);border-color:var(--glass-border2)}
.poll-name{font-family:var(--fd);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.poll-form{font-family:var(--fm);font-size:1.1rem;font-weight:700;margin-top:.1rem}
.poll-val{font-family:var(--fm);font-size:1.6rem;font-weight:700;margin-top:.5rem;line-height:1}
.poll-unit{font-size:.7rem;color:var(--muted);margin-top:.15rem}
.poll-bar{height:5px;background:var(--glass-border);border-radius:3px;margin-top:.5rem;overflow:hidden}
.poll-fill{height:100%;border-radius:3px;transition:width 1s ease}
.poll-who{font-size:.7rem;color:var(--muted);margin-top:.5rem}
@media(max-width:768px){.aqi-hero{grid-template-columns:1fr}}
</style></head><body>
<canvas id="weather-canvas"></canvas>
<div class="page-wrap">
<nav class="nav"><a href="../index.html" class="nav-logo">🌤️ SkyCast</a>
<ul class="nav-links" id="nl"><li><a href="../index.html">🏠 Dashboard</a></li><li><a href="forecast.html">📅 Forecast</a></li><li><a href="hourly.html">🕐 Hourly</a></li><li><a href="map.html">🗺️ Map</a></li><li><a href="air-quality.html" class="active">🌿 Air Quality</a></li><li><a href="alerts.html">⚠️ Alerts</a></li><li><a href="compare.html">⚖️ Compare</a></li><li><a href="settings.html">⚙️ Settings</a></li></ul>
<div class="nav-right"><button class="hamburger" onclick="document.getElementById('nl').classList.toggle('mob-open')"><span></span><span></span><span></span></button></div></nav>
<main class="main">
  <div class="fade-up"><div class="page-title">🌿 Air Quality Index</div><div class="page-sub" id="city-sub">Loading…</div></div>
  <div class="search-row fade-up a1"><div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="city-search" type="text" placeholder="Search city…" style="padding-left:2.8rem"/></div>
  <button class="btn btn-ghost btn-sm" onclick="useMyLoc()">📍 My Location</button></div>
  <div id="aqi-content"><div class="loading-wrap"><div class="spinner"></div><span>Loading air quality…</span></div></div>
</main></div>
<script src="../js/config.js"></script><script src="../js/api.js"></script><script src="../js/animations.js"></script>
<script>
requireAuth();
let curLat=CONFIG.DEFAULT_LAT,curLon=CONFIG.DEFAULT_LON;
const sv=JSON.parse(localStorage.getItem('skycast_last')||'null');if(sv){curLat=sv.lat;curLon=sv.lon;}
const LEVELS=[{label:'Good',color:'#4ade80',desc:'Air quality is satisfactory.',health:[{e:'😊',t:'General Population',d:'Enjoy outdoor activities freely.'},{e:'🏃',t:'Active People',d:'No limitations. Great for outdoor exercise.'}]},{label:'Fair',color:'#a3e635',desc:'Acceptable air quality. Some pollutants may concern sensitive people.',health:[{e:'😐',t:'Sensitive Groups',d:'Consider reducing prolonged outdoor exertion.'},{e:'💚',t:'General Population',d:'Active children and adults can be outdoors.'}]},{label:'Moderate',color:'#facc15',desc:'Sensitive groups may experience health effects.',health:[{e:'😷',t:'Sensitive Groups',d:'Reduce prolonged or heavy outdoor exertion.'},{e:'⚠️',t:'General Population',d:'Unusually sensitive people should reduce outdoor exertion.'}]},{label:'Poor',color:'#fb923c',desc:'Everyone may begin to experience health effects.',health:[{e:'🏥',t:'Sensitive Groups',d:'Avoid prolonged outdoor exertion. Move activities indoors.'},{e:'😷',t:'General Population',d:'Reduce prolonged or heavy outdoor exertion.'}]},{label:'Very Poor',color:'#f87171',desc:'Health warnings. The entire population is affected.',health:[{e:'🚫',t:'Everyone',d:'Avoid all outdoor physical activity.'},{e:'🏠',t:'General Advice',d:'Stay indoors. Keep windows closed.'}]}];
const POLLS=[{k:'co',n:'Carbon Monoxide',f:'CO',unit:'μg/m³',who:10000,c:'#fb923c'},{k:'no',n:'Nitric Oxide',f:'NO',unit:'μg/m³',who:40,c:'#f87171'},{k:'no2',n:'Nitrogen Dioxide',f:'NO₂',unit:'μg/m³',who:40,c:'#ef4444'},{k:'o3',n:'Ozone',f:'O₃',unit:'μg/m³',who:100,c:'#818cf8'},{k:'so2',n:'Sulfur Dioxide',f:'SO₂',unit:'μg/m³',who:20,c:'#facc15'},{k:'pm2_5',n:'Fine Particles',f:'PM2.5',unit:'μg/m³',who:15,c:'#38bdf8'},{k:'pm10',n:'Coarse Particles',f:'PM10',unit:'μg/m³',who:45,c:'#60a5fa'},{k:'nh3',n:'Ammonia',f:'NH₃',unit:'μg/m³',who:1,c:'#4ade80'}];
async function loadPage(lat,lon){
  curLat=lat;curLon=lon;document.getElementById('aqi-content').innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  try{
    const[cur,aqi,aqiFc]=await Promise.all([WeatherAPI.getCurrent(lat,lon),WeatherAPI.getAirQuality(lat,lon),WeatherAPI.getAirQualityForecast(lat,lon)]);
    const isDay=cur.dt>cur.sys.sunrise&&cur.dt<cur.sys.sunset;applyWeatherBackground(cur.weather[0].id,isDay);setWeatherAnimation(cur.weather[0].id,isDay);
    document.getElementById('city-sub').textContent='📍 '+cur.name+', '+cur.sys.country;
    renderAQI(aqi.list[0],aqiFc.list);
  }catch(e){document.getElementById('aqi-content').innerHTML='<div class="error-card">⚠️ '+e.message+'</div>';}
}
function renderAQI(current,fcList){
  const idx=current.main.aqi,lv=LEVELS[idx-1],comp=current.components,color=lv.color;
  const segs=LEVELS.map((l,i)=>`<div class="aqi-seg ${i===idx-1?'active':'dim'}" style="background:${l.color};color:${l.color}"></div>`).join('');
  const fcCards=fcList.filter((_,i)=>i%8===0).slice(0,6).map(fc=>{const lv2=LEVELS[fc.main.aqi-1];return`<div class="fc-card"><div class="fc-time">${new Date(fc.dt*1000).toLocaleDateString('en-US',{weekday:'short',timeZone:'UTC'})}</div><div class="fc-num" style="color:${lv2.color}">${fc.main.aqi}</div><div class="fc-lbl" style="color:${lv2.color}">${lv2.label}</div></div>`;}).join('');
  const pollCards=POLLS.map(p=>{const val=comp[p.k]!==undefined?comp[p.k].toFixed(1):'N/A';const pct=comp[p.k]?Math.min(100,(comp[p.k]/p.who)*100):0;const bc=pct>100?'#f87171':pct>60?'#fb923c':pct>30?'#facc15':p.c;
    return`<div class="poll-card fade-up"><div class="poll-name">${p.n}</div><div class="poll-form">${p.f}</div><div class="poll-val" style="color:${bc}">${val}</div><div class="poll-unit">${p.unit}</div><div class="poll-bar"><div class="poll-fill" style="width:${Math.min(pct,100)}%;background:${bc}"></div></div><div class="poll-who">WHO limit: ${p.who} ${p.unit}</div></div>`;}).join('');
  const healthRows=lv.health.map(h=>`<div class="hr-row"><div class="hr-emoji">${h.e}</div><div><div class="hr-title">${h.t}</div><div class="hr-desc">${h.d}</div></div></div>`).join('');
  document.getElementById('aqi-content').innerHTML=`
    <div class="aqi-hero fade-up">
      <div class="aqi-main" style="border-color:${color}44">
        <div class="section-title">Current AQI</div>
        <div class="aqi-num" style="color:${color}">${idx}</div>
        <div class="aqi-label" style="color:${color}">${lv.label} ${WeatherAPI.aqiEmoji(idx)}</div>
        <div class="aqi-scale">${segs}</div>
        <div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--faint);font-family:var(--fm)">${LEVELS.map(l=>`<span>${l.label}</span>`).join('')}</div>
        <div class="aqi-desc">${lv.desc}</div>
      </div>
      <div class="aqi-health"><div class="section-title" style="margin-bottom:.75rem">💡 Health Advice</div>${healthRows}</div>
    </div>
    <div class="section-header fade-up"><div class="section-title">📅 AQI Forecast</div></div>
    <div class="fc-strip fade-up a1">${fcCards}</div>
    <div class="section-header fade-up"><div class="section-title">🧪 Pollutant Breakdown</div></div>
    <div class="poll-grid">${pollCards}</div>`;
}
function useMyLoc(){navigator.geolocation.getCurrentPosition(p=>loadPage(p.coords.latitude,p.coords.longitude));}
initSearch('city-search',({lat,lon})=>loadPage(lat,lon));
initWeatherCanvas();loadPage(curLat,curLon);
</script></body></html>
