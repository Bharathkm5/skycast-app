<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>SkyCast AI</title>

<link rel="stylesheet" href="../css/global.css"/>

<style>

*{
  box-sizing:border-box;
}

body{
  background:#071120;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */

.navbar{
  width:100%;
  height:65px;
  background:#0b1727;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid rgba(255,255,255,.08);
  position:sticky;
  top:0;
  z-index:999;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.back-btn{
  background:#2563eb;
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
}

.logo{
  font-size:1.2rem;
  font-weight:bold;
}

.menu-btn{
  background:none;
  border:none;
  color:white;
  font-size:28px;
  cursor:pointer;
}

/* DROPDOWN */

.menu{
  position:absolute;
  top:70px;
  right:20px;
  background:#0f172a;
  border-radius:14px;
  overflow:hidden;
  display:none;
  flex-direction:column;
  min-width:180px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.menu a{
  color:white;
  text-decoration:none;
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.menu a:hover{
  background:#1e293b;
}

/* CHAT */

.chat-wrap{
  width:100%;
  max-width:900px;
  margin:auto;
  height:calc(100vh - 65px);
  display:flex;
  flex-direction:column;
}

.top{
  padding:1rem;
  border-bottom:1px solid rgba(255,255,255,.1);
  font-size:1.3rem;
  font-weight:bold;
}

.messages{
  flex:1;
  overflow:auto;
  padding:1rem;
}

.msg{
  padding:1rem;
  border-radius:14px;
  margin-bottom:1rem;
  max-width:80%;
  line-height:1.6;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.ai{
  background:#1e293b;
}

.bottom{
  padding:1rem;
  border-top:1px solid rgba(255,255,255,.1);
}

.input-row{
  display:flex;
  gap:.75rem;
}

input{
  flex:1;
  padding:1rem;
  border:none;
  border-radius:12px;
  background:#0f172a;
  color:white;
  font-size:1rem;
}

.send-btn{
  padding:1rem 1.5rem;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.quick{
  display:flex;
  gap:.5rem;
  margin-top:.75rem;
  flex-wrap:wrap;
}

.quick button{
  background:#1e293b;
  font-size:.85rem;
  border:none;
  color:white;
  padding:.8rem 1rem;
  border-radius:10px;
  cursor:pointer;
}

/* MOBILE */

@media(max-width:600px){

  .msg{
    max-width:95%;
  }

  .logo{
    font-size:1rem;
  }

  .back-btn{
    padding:8px 10px;
    font-size:14px;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

  <div class="nav-left">

    <button
      class="back-btn"
      onclick="goBack()"
    >
      ← Back
    </button>

    <div class="logo">
      🌤️ SkyCast AI
    </div>

  </div>

  <button
    class="menu-btn"
    onclick="toggleMenu()"
  >
    ☰
  </button>

  <div class="menu" id="menu">

    <a href="../index.html">
      🏠 Home
    </a>

    <a href="./dashboard.html">
      📊 Dashboard
    </a>

    <a href="./ai-chat.html">
      🤖 AI Chat
    </a>

  </div>

</div>

<!-- CHAT -->

<div class="chat-wrap">

  <div class="top">
    AI Weather Assistant
  </div>

  <div class="messages" id="messages">

    <div class="msg ai">
      Hello 👋<br><br>

      Ask me anything about weather,
      rain, storms, bike safety,
      travel and climate updates.
    </div>

  </div>

  <div class="bottom">

    <div class="input-row">

      <input
        id="chat-input"
        placeholder="Ask anything..."
      />

      <button
        class="send-btn"
        onclick="sendMessage()"
      >
        Send
      </button>

    </div>

    <div class="quick">

      <button onclick="quickAsk('Can I go outside today?')">
        Go Outside?
      </button>

      <button onclick="quickAsk('Can I ride bike today?')">
        Bike Ride?
      </button>

      <button onclick="quickAsk('Will it rain today?')">
        Rain Today?
      </button>

      <button onclick="quickAsk('Weather summary today')">
        Weather Summary
      </button>

    </div>

  </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>

<script>

let currentCity =
  CONFIG.DEFAULT_CITY || 'Unknown';

let currentLat =
  CONFIG.DEFAULT_LAT;

let currentLon =
  CONFIG.DEFAULT_LON;

/* GET USER LOCATION */

if(navigator.geolocation){

  navigator.geolocation.getCurrentPosition(

    pos=>{

      currentLat =
        pos.coords.latitude;

      currentLon =
        pos.coords.longitude;

    },

    err=>{
      console.log(err);
    }

  );

}

/* MENU */

function toggleMenu(){

  const menu =
    document.getElementById('menu');

  if(menu.style.display==='flex'){
    menu.style.display='none';
  }else{
    menu.style.display='flex';
  }

}

/* BACK */

function goBack(){
  window.history.back();
}

/* ADD MESSAGE */

function addMessage(text,type){

  const div =
    document.createElement('div');

  div.className =
    'msg '+type;

  div.innerHTML =
    text.replace(/\n/g,'<br>');

  document
    .getElementById('messages')
    .appendChild(div);

  div.scrollIntoView({
    behavior:'smooth'
  });

}

/* SEND MESSAGE */

async function sendMessage(){

  const input =
    document.getElementById('chat-input');

  const question =
    input.value.trim();

  if(!question) return;

  addMessage(question,'user');

  input.value='';

  try{

    const weather =
      await WeatherAPI.getCurrent(
        currentLat,
        currentLon
      );

    const res =
      await fetch(
        `${CONFIG.BACKEND_URL}/api/ai/chat`,
        {
          method:'POST',

          headers:{
            'Content-Type':'application/json'
          },

          body:JSON.stringify({

            city:
              weather.name || currentCity,

            message:
              question,

            weather

          })
        }
      );

    const data =
      await res.json();

    if(!res.ok){

      throw new Error(
        data.error || 'AI failed'
      );

    }

    addMessage(
      data.reply,
      'ai'
    );

  }catch(err){

    addMessage(
      '❌ '+err.message,
      'ai'
    );

  }

}

/* QUICK ASK */

function quickAsk(q){

  document
    .getElementById('chat-input')
    .value=q;

  sendMessage();

}

/* ENTER KEY */

document
  .getElementById('chat-input')
  .addEventListener(
    'keydown',
    e=>{

      if(e.key==='Enter'){
        sendMessage();
      }

    }
  );

</script>

</body>
</html>
