<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP — SkyCast</title>
<link rel="stylesheet" href="../css/global.css">
</head>

<body style="display:flex;align-items:center;justify-content:center;height:100vh;">

<div class="card" style="width:360px;text-align:center;padding:2rem;">
  <h2>🔐 Enter OTP</h2>
  <p id="otp-msg">Check your email</p>

  <input id="otp-input" type="text" placeholder="Enter 6-digit OTP"
    style="width:100%;padding:10px;margin:1rem 0;text-align:center;font-size:1.2rem;"/>

  <button onclick="verifyOTP()" class="btn btn-primary" style="width:100%;">
    Verify
  </button>

  <button onclick="resendOTP()" class="btn btn-ghost" style="margin-top:10px;">
    Resend OTP
  </button>
</div>

<script src="../js/api.js"></script>

<script>
const email = localStorage.getItem('otp_email');

if (!email) {
  alert("No email found. Please login again.");
  window.location.href = "../index.html";
}

async function verifyOTP() {
  const otp = document.getElementById('otp-input').value;

  try {
    const res = await fetch(`${CONFIG.API_BASE}/auth/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    alert("✅ Login success");
    window.location.href = "../index.html";

  } catch (err) {
    alert(err.message);
  }
}

async function resendOTP() {
  await fetch(`${CONFIG.API_BASE}/auth/resend-otp`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  alert("📩 OTP resent");
}
</script>

</body>
</html>
