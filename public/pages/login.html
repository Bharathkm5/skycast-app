<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>SkyCast — Sign In</title>

<link rel="stylesheet" href="../css/global.css"/>

<style>
body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

.au{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}

.ab{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:.28;
  animation:fb 9s ease-in-out infinite;
}

.ab:nth-child(1){
  width:700px;
  height:700px;
  background:radial-gradient(#1e40af,#38bdf8);
  top:-250px;
  left:-220px;
}

.ab:nth-child(2){
  width:550px;
  height:550px;
  background:radial-gradient(#7c3aed,#818cf8);
  top:15%;
  right:-160px;
  animation-delay:2.5s;
}

.ab:nth-child(3){
  width:450px;
  height:450px;
  background:radial-gradient(#f97316,#fb923c);
  bottom:-120px;
  left:30%;
  animation-delay:4.5s;
}

.ab:nth-child(4){
  width:380px;
  height:380px;
  background:radial-gradient(#0891b2,#22d3ee);
  bottom:5%;
  left:-80px;
  animation-delay:1.5s;
}

@keyframes fb{
  0%,100%{
    transform:translate(0,0) scale(1);
  }

  33%{
    transform:translate(30px,-20px) scale(1.06);
  }

  66%{
    transform:translate(-20px,30px) scale(.94);
  }
}

#sc{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

.card{
  position:relative;
  z-index:10;
  width:100%;
  max-width:430px;
  margin:1rem;
  background:rgba(8,18,38,.82);
  border:1px solid rgba(255,255,255,.13);
  border-radius:26px;
  backdrop-filter:blur(44px);
  padding:2.5rem 2.25rem;
  box-shadow:0 36px 90px rgba(0,0,0,.65);
}

.logo{
  text-align:center;
  margin-bottom:1.75rem;
}

.logo-icon{
  font-size:3rem;
  display:block;
  margin-bottom:.5rem;
}

.logo-text{
  font-family:var(--fd);
  font-size:1.9rem;
  font-weight:800;
  background:linear-gradient(
    90deg,
    var(--accent),
    var(--accent2)
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.logo-sub{
  font-size:.82rem;
  color:var(--muted);
  margin-top:.25rem;
}

.tabs{
  display:flex;
  gap:2px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--glass-border);
  border-radius:10px;
  padding:3px;
  margin-bottom:1.75rem;
}

.tab{
  flex:1;
  text-align:center;
  padding:.5rem;
  border-radius:8px;
  font-size:.875rem;
  font-weight:600;
  cursor:pointer;
  border:none;
  background:none;
  color:var(--muted);
  transition:var(--trans);
}

.tab.active{
  background:var(--glass-2);
  color:var(--text);
  border:1px solid var(--glass-border);
}

.err-msg{
  background:rgba(248,113,113,.1);
  border:1px solid rgba(248,113,113,.3);
  border-radius:8px;
  padding:.6rem .9rem;
  font-size:.82rem;
  color:var(--danger);
  margin-bottom:.75rem;
  display:none;
}

.err-msg.on{
  display:block;
}

.pw-wrap{
  position:relative;
}

.pw-eye{
  position:absolute;
  right:.9rem;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
}

.or-div{
  display:flex;
  align-items:center;
  gap:.75rem;
  margin:1.25rem 0;
  color:var(--muted);
  font-size:.78rem;
}

.or-div::before,
.or-div::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--glass-border);
}
</style>
</head>

<body>

<div class="au">
  <div class="ab"></div>
  <div class="ab"></div>
  <div class="ab"></div>
  <div class="ab"></div>
</div>

<canvas id="sc"></canvas>

<div class="card">

  <div class="logo">
    <span class="logo-icon">🌤️</span>

    <div class="logo-text">
      SkyCast
    </div>

    <div class="logo-sub">
      Your intelligent weather companion
    </div>
  </div>

  <div class="err-msg" id="err"></div>

  <div class="tabs">
    <button
      class="tab active"
      id="tl"
      onclick="switchMode('login')"
    >
      Sign In
    </button>

    <button
      class="tab"
      id="tr"
      onclick="switchMode('register')"
    >
      Create Account
    </button>
  </div>

  <div class="form-group" style="margin-bottom:1rem">

    <label class="form-label">
      Email Address
    </label>

    <input
      class="form-input"
      id="em"
      type="email"
      placeholder="you@example.com"
    />
  </div>

  <div
    class="form-group"
    id="grp-name"
    style="margin-bottom:1rem;display:none"
  >

    <label class="form-label">
      Full Name
    </label>

    <input
      class="form-input"
      id="nm"
      type="text"
      placeholder="Your full name"
    />
  </div>

  <div class="form-group" style="margin-bottom:1.5rem">

    <label class="form-label">
      Password
    </label>

    <div class="pw-wrap">

      <input
        class="form-input"
        id="pw"
        type="password"
        placeholder="Minimum 6 characters"
        style="padding-right:2.8rem"
      />

      <button
        class="pw-eye"
        onclick="togglePw()"
      >
        👁️
      </button>

    </div>
  </div>

  <button
    class="btn btn-primary btn-full"
    id="btn1"
    onclick="submitAuth()"
  >
    Continue →
  </button>

  <div class="or-div">
    or
  </div>

  <button
    class="btn btn-ghost btn-full"
    onclick="demoLogin()"
  >
    🚀 Demo Login
  </button>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>

<script>
(function(){

  const c=document.getElementById('sc');
  const ctx=c.getContext('2d');

  c.width=innerWidth;
  c.height=innerHeight;

  const stars=Array.from(
    {length:160},
    ()=>({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      r:.3+Math.random()*1.3,
      t:Math.random()*Math.PI*2,
      ts:.008+Math.random()*.02
    })
  );

  function draw(){

    ctx.clearRect(0,0,c.width,c.height);

    stars.forEach(p=>{

      p.t+=p.ts;

      ctx.beginPath();

      ctx.arc(
        p.x,
        p.y,
        p.r,
        0,
        Math.PI*2
      );

      ctx.fillStyle=
      `rgba(
        255,
        255,
        255,
        ${(.15+.55*Math.sin(p.t)).toFixed(2)}
      )`;

      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  draw();

})();

if(getCurrentUser() && getToken()){
  location.href='../index.html';
}

let mode='login';

function switchMode(m){

  mode=m;

  document
    .getElementById('tl')
    .classList.toggle(
      'active',
      m==='login'
    );

  document
    .getElementById('tr')
    .classList.toggle(
      'active',
      m==='register'
    );

  document
    .getElementById('grp-name')
    .style.display =
      m==='register'
      ? 'block'
      : 'none';

  clearErr();
}

function togglePw(){

  const input =
    document.getElementById('pw');

  input.type =
    input.type==='password'
    ? 'text'
    : 'password';
}

function showErr(msg){

  const e =
    document.getElementById('err');

  e.textContent=msg;

  e.classList.add('on');
}

function clearErr(){

  document
    .getElementById('err')
    .classList.remove('on');
}

function setLoad(v){

  document
    .getElementById('btn1')
    .classList.toggle(
      'btn-loading',
      v
    );
}

async function submitAuth(){

  clearErr();

  const email =
    document
      .getElementById('em')
      .value
      .trim()
      .toLowerCase();

  const password =
    document
      .getElementById('pw')
      .value;

  const name =
    document
      .getElementById('nm')
      .value
      .trim();

  if(!email || !email.includes('@')){
    return showErr(
      'Enter valid email.'
    );
  }

  if(password.length < 6){
    return showErr(
      'Password must be at least 6 characters.'
    );
  }

  if(mode==='register' && !name){
    return showErr(
      'Enter your full name.'
    );
  }

  setLoad(true);

  try {

    const endpoint =
      mode==='register'
      ? '/api/auth/register'
      : '/api/auth/login';

    const body =
      mode==='register'
      ? {
          name,
          email,
          password
        }
      : {
          email,
          password
        };

    const data =
      await apiCall(
        endpoint,
        {
          method:'POST',
          body:JSON.stringify(body)
        }
      );

    setToken(data.token);

    setCurrentUser(data.user);

    localStorage.setItem(
      'skycast_user',
      JSON.stringify(data.user)
    );

    localStorage.setItem(
      'skycast_token',
      data.token
    );

    alert(
      mode==='register'
      ? 'Account created successfully'
      : 'Login successful'
    );

    location.href='../index.html';

  } catch(err){

    showErr(
      err.message ||
      'Authentication failed'
    );

  } finally {

    setLoad(false);
  }
}

function demoLogin(){

  const user = {
    _id:'demo',
    name:'Demo User',
    email:'demo@skycast.app',
    verified:true,
    role:'user'
  };

  localStorage.setItem(
    'skycast_user',
    JSON.stringify(user)
  );

  localStorage.setItem(
    'skycast_token',
    'demo_token'
  );

  location.href='../index.html';
}

document
  .getElementById('pw')
  .addEventListener(
    'keydown',
    e=>{
      if(e.key==='Enter'){
        submitAuth();
      }
    }
  );
</script>

</body>
</html>
